            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;

            padding: 48px 40px;

        h1 {

            color: #1d1d1f;
            margin-bottom: 36px;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
            font-weight: 300;
        }
        input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
            background: #fff;
        }
        input::placeholder {
            color: #86868b;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 400;
        }
        button:hover {
            background: #0071e3;
        }
        button:active {
            transform: scale(0.98);
        }
        .result-box {
            background: #fafafa;
            border-radius: 12px;
            padding: 28px;
            margin-top: 24px;
            display: none;
        }
        .result-box.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .calculation {
            font-size: 12px;
            color: #86868b;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.8;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
        }
        .result-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-number {
            font-size: 14px;
            font-weight: 400;
            color: #1d1d1f;
        }
        .fortune-type {
            font-size: 18px;
            font-weight: 500;
            padding: 4px 16px;
            border-radius: 6px;
            letter-spacing: 2px;
        }

        .fortune-type.ji { background: #e3f2fd; color: #1565c0; }
        .fortune-type.zhongji { background: #fff8e1; color: #f57f17; }

        .fortune-type.banji { background: #fff3e0; color: #e65100; }

        .fortune-type.jizhongxiong { background: #fce4ec; color: #c62828; }

            font-size: 14px;
            line-height: 2;
            color: #3d3d3d;
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            letter-spacing: 1px;

        function calculate() {
            const input = document.getElementById('numberInput').value.trim();
            if (!input || !/^\d+$/.test(input)) {
                alert('请输入纯数字');
                return;
            }

            const lastFour = input.slice(-4).padStart(4, '0');
            const num = parseInt(lastFour, 10);
            const quotient = num / 80;
            const integer = Math.floor(quotient);
            const decimal = quotient - integer;
            const result = Math.round(decimal * 80);

            document.getElementById('calculation').innerHTML = 
                `输入: ${input} → 后四位: ${lastFour}<br>计算: ${lastFour} ÷ 80 = ${quotient.toFixed(4)}<br>取小数 ${decimal.toFixed(4)} × 80 = ${result}`;

            document.getElementById('resultNumber').textContent = `数理 ${result}`;
            
            const fortune = fortuneData[result] || fortuneData[0];
            const typeEl = document.getElementById('fortuneType');
            typeEl.textContent = fortune.type;
            typeEl.className = 'fortune-type ' + fortune.style;

            document.getElementById('resultFortune').textContent = fortune.text;

            document.getElementById('resultBox').classList.add('show');
        }

        document.getElementById('numberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate();
        });
    </script>
