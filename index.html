        }

            font-size: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 400;

        button:hover {
            background: #0071e3;
        }

            background: #fafafa;
            border-radius: 12px;
            padding: 28px;
            margin-top: 24px;
            display: none;
        }

            display: block;
            animation: slideIn 0.3s ease;

        }
        .calculation {
            font-size: 12px;
            color: #86868b;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.8;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
        }

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-number {
            font-size: 14px;
            font-weight: 400;
            color: #1d1d1f;
        }

            font-weight: 500;
            padding: 4px 16px;
            border-radius: 6px;

            font-size: 14px;
            line-height: 2;
            color: #3d3d3d;

            background: #fff;
            padding: 20px;

            77: { text: "小人挡道 苦境难安\n悲叹命运 难以守成\n反复不定 得而后陷\n阳金\n忧愁运数", type: "小凶", style: "xiaoji" },
            78: { text: "得失兼并 外实内虚\n需防劫财 凶吉参半\n华而不实 后运凄凉\n阴金\n枯木运数", type: "半吉", style: "banji" },
            79: { text: "心高志大 有勇无谋\n如行夜路 前途无光\n希望不大 劳而无功\n阳水\n劳苦运数", type: "凶", style: "xiong" },
            80: { text: "刑伤破财 贵人失力\n安心立命 始可平安\n枉费心机 贪财失官\n阴水\n挫折运数", type: "半吉", style: "banji" },
            81: { text: "万物回春 九九归一\n繁荣富贵 发达成功\n还本归元 昂极之数\n阳木\n大成运数", type: "大吉", style: "daji" },
            0: { text: "空虚为空 四大皆空\n若行佛道 必定成功\n若经从商 大成大败", type: "吉中凶", style: "jizhongxiong" }
        };

        function calculate() {
            const input = document.getElementById('numberInput').value.trim();
            if (!input || !/^\d+$/.test(input)) {
                alert('请输入纯数字');
                return;
            }

            const lastFour = input.slice(-4).padStart(4, '0');
            const num = parseInt(lastFour, 10);
            const quotient = num / 80;
            const integer = Math.floor(quotient);
            const decimal = quotient - integer;
            const result = Math.round(decimal * 80);

            document.getElementById('calculation').innerHTML = 
                `输入: ${input} → 后四位: ${lastFour}<br>计算: ${lastFour} ÷ 80 = ${quotient.toFixed(4)}<br>取小数 ${decimal.toFixed(4)} × 80 = ${result}`;

            document.getElementById('resultNumber').textContent = `数理 ${result}`;
            
            const fortune = fortuneData[result] || fortuneData[0];
            const typeEl = document.getElementById('fortuneType');
            typeEl.textContent = fortune.type;
            typeEl.className = 'fortune-type ' + fortune.style;

            document.getElementById('resultFortune').textContent = fortune.text;

            document.getElementById('resultBox').classList.add('show');
        }

        document.getElementById('numberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate();
        });
    </script>
